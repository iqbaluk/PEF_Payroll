<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Closing — Payroll_View</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'IBM Plex Sans',sans-serif;
           background:#0a1628; color:white;
           min-height:100vh; display:flex;
           align-items:center; justify-content:center; }
    .box { text-align:center; padding:40px; }
    .icon { font-size:52px; margin-bottom:20px; }
    h1 { font-size:22px; font-weight:700; margin-bottom:8px; }
    .sub { font-size:13px; opacity:.5; margin-top:8px; }
    .progress-bar {
      width:280px; height:4px; background:rgba(255,255,255,.1);
      border-radius:2px; margin:20px auto 0; overflow:hidden;
    }
    .progress-fill {
      height:100%; background:#f9a825; border-radius:2px;
      width:0%; animation:fill 2.2s ease forwards;
    }
    @keyframes fill { to { width:100%; } }
    .dot { display:inline-block; width:7px; height:7px;
           background:#f9a825; border-radius:50%; margin:0 3px;
           animation:bounce .7s infinite alternate; }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { to { opacity:.2; transform:translateY(-5px); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔒</div>
    <h1>Closing Payroll_View</h1>
    <div style="margin:14px 0;">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <p class="sub">Saving data and stopping server...</p>
    <p class="sub" style="margin-top:6px;">© 2026 SoftFlow Ltd</p>
  </div>
  <script>
    // Auto close tab after server stops (2.5s delay matches server)
    setTimeout(() => { window.close(); }, 3000);
  </script>
</body>
</html>
